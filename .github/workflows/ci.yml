name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy packages/ || true   # non-blocking until stubs mature

      - name: Test
        run: uv run pytest
        env:
          ENV: test
          LOG_LEVEL: DEBUG
          LLM_MODEL: gpt-4o-mini
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANCEDB_PATH: ./.lancedb_ci

      - name: Build package
        run: uv build

      - name: Wheel smoke test
        run: |
          python -m venv /tmp/nexagauge-wheel-test
          source /tmp/nexagauge-wheel-test/bin/activate
          pip install dist/*.whl
          nexagauge --help
