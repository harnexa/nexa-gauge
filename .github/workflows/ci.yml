name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PR title follows Conventional Commits
        if: github.event_name == 'pull_request' && github.actor != 'release-please[bot]'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|deps|chore|docs|refactor|perf|test|build|ci|revert)(\([^)]+\))?(!)?: .+'
          if [[ "${PR_TITLE}" =~ ${pattern} ]]; then
            echo "PR title is conventional: ${PR_TITLE}"
            exit 0
          fi
          echo "::error title=Invalid PR title::Release Please requires Conventional Commit style titles."
          echo "Expected format: type(scope): summary"
          echo "Examples:"
          echo "  fix(cli): handle --max-workers default correctly"
          echo "  feat(runner): add llm concurrency control"
          echo "  chore: update docs"
          echo ""
          echo "Current title: ${PR_TITLE}"
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy packages/ || true   # non-blocking until stubs mature

      - name: Test
        run: uv run pytest
        env:
          ENV: test
          LOG_LEVEL: DEBUG
          LLM_MODEL: gpt-4o-mini
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANCEDB_PATH: ./.lancedb_ci

      - name: Build package
        run: uv build

      - name: Wheel smoke test
        run: |
          python -m venv /tmp/nexagauge-wheel-test
          source /tmp/nexagauge-wheel-test/bin/activate
          pip install dist/*.whl
          nexagauge --help
