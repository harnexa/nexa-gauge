[project]
name = "nexagauge-graph"
version = "0.1.2"
description = "LangGraph orchestration graph and metric dispatch nodes for nexa-gauge"
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.0",
    "litellm==1.83.7",
    "tokencost>=0.1.26",
    "rich>=13.0.0",
    "nexagauge-core",
    "rouge-score>=0.1.2",
    "nltk>=3.8.0",
    "semchunk>=2.2.0",
]

[tool.uv.sources]
nexagauge-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ng_graph"]
