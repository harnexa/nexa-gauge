[project]
name = "lumiseval-graph"
version = "0.1.0"
description = "LangGraph orchestration graph and metric dispatch nodes for lumis-eval"
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.0",
    "langgraph>=0.2.0",
    "litellm==1.82.6",
    "tokencost>=0.1.26",
    "ragas>=0.4.0",
    "deepeval>=1.0.0",
    "rich>=13.0.0",
    "taskiq>=0.11.0",
    "lumiseval-core",
    "rouge-score>=0.1.2",
    "nltk>=3.8.0",
    "semchunk>=2.2.0",
]

[project.optional-dependencies]
observability = [
    "langfuse>=3.12.0",
]

[tool.uv.sources]
lumiseval-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lumiseval_graph"]
