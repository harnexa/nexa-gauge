[project]
name = "lumiseval-evidence"
version = "0.1.0"
description = "Evidence routing (LanceDB + Tavily), MMR deduplication, and document indexing"
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.0",
    "lancedb>=0.5.0",
    "sentence-transformers>=3.0.0",
    "tavily-python>=0.3.0",
    "numpy>=1.24.0",
    "lumiseval-core",
]

[tool.uv.sources]
lumiseval-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lumiseval_evidence"]
