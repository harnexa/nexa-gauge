[project]
name = "lumiseval-ingest"
version = "0.1.0"
description = "Metadata scanner and semantic chunker for lumis-eval"
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.0",
    "tiktoken>=0.7.0",
    "semchunk>=2.0.0",
    "lumiseval-core",
]

[tool.uv.sources]
lumiseval-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lumiseval_ingest"]
